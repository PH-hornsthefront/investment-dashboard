<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investment Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin:10px 0;
}

</style>

</head>

<body>

<h1>📈 Investment Dashboard</h1>

<div id="dashboard">
Loading...
</div>

<script>

fetch("./data/market.json")
.then(response => response.json())
.then(data => {

document.getElementById("dashboard").innerHTML = `

<div class="card">
<h2>市場指數</h2>
<p>🇹🇼 台股加權指數：${data.taiex}</p>
</div>

<div class="card">
<h2>追蹤個股 / ETF</h2>

<p>🚗 TSLA：$${data.tsla}</p>

<p>🚀 SPCX：$${data.spcx}</p>

</div>


<div class="card">
  <h2>AI 市場摘要</h2>
  ${summaryHtml}
</div>


<p>
let summaryHtml =
  "<ol>" +
  data.summary.map(item => `<li>${item}</li>`).join("") +
  "</ol>";
</p>
</div>

`;

});

</script>

</body>
</html>
